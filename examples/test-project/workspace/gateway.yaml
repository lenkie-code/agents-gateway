server:
  port: 8000

model:
  default: "gemini/gemini-2.0-flash"
  temperature: 0.1

memory:
  enabled: true
  auto_extract: true
  compaction:
    enabled: true
    max_memories_per_scope: 100
    compact_ratio: 0.5

cors:
  enabled: true
  # allow_origins: ["https://your-app.com"]  # restrict in production

rate_limit:
  enabled: false
  default_limit: "200/minute"
  # storage_uri: "redis://localhost:6379"  # for multi-worker deployments
  # trust_forwarded_for: false  # set true when behind a reverse proxy

security:
  enabled: true
  # x_frame_options: DENY
  # strict_transport_security: "max-age=31536000; includeSubDomains"
  # content_security_policy: "default-src 'self'"

scheduler:
  enabled: true
  distributed_lock:
    enabled: true
    backend: auto  # auto-detects Redis or Postgres
    lock_ttl_seconds: 300

guardrails:
  timeout_ms: 300000  # 5 minutes — design/data APIs can be slow
  max_iterations: 15

mcp:
  tool_call_timeout_ms: 300000  # 5 minutes per tool call — design APIs can be very slow

telemetry:
  enabled: true
  exporter: console
