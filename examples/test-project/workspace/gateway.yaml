server:
  port: 8000

model:
  default: "gemini/gemini-2.0-flash"
  temperature: 0.1

memory:
  enabled: true
  auto_extract: true
  compaction:
    enabled: true
    max_memories_per_scope: 100
    compact_ratio: 0.5

cors:
  enabled: true
  # allow_origins: ["https://your-app.com"]  # restrict in production

rate_limit:
  enabled: true
  default_limit: "200/minute"
  # storage_uri: "redis://localhost:6379"  # for multi-worker deployments
  # trust_forwarded_for: false  # set true when behind a reverse proxy

telemetry:
  enabled: true
  exporter: console
