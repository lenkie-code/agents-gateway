version: 0.2

phases:
  pre_build:
    commands:
      - echo ECR Login
      - aws --version
      - aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 666760490749.dkr.ecr.eu-west-1.amazonaws.com
      - REPOSITORY_URI=666760490749.dkr.ecr.eu-west-1.amazonaws.com
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)
      - CONTAINER_NAME="agents_gateway_worker"
  build:
    commands:
      - echo Build started `date`
      - echo Building Docker Image
      - docker build -t $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:latest -f ./Dockerfile.worker ./
      - docker tag $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:latest $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:$IMAGE_TAG
      - docker tag $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:latest $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:beta-$IMAGE_TAG
      - echo docker images
  post_build:
    commands:
      - echo Build completed `date`
      - echo Pushing Docker images
      - docker push $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:latest
      - docker push $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:$IMAGE_TAG
      - docker push $REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:beta-$IMAGE_TAG
      - echo "Creating imagedefinitions.json"
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$REPOSITORY_URI/lenkie/prod/agents-gateway.worker.svc:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
